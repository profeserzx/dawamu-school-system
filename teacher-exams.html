<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawamu School - Exam Results</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #F0F5E6; }
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #8DB600;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 50px; }
        .logo h1 { color: #8DB600; }
        .back-btn { background: #8DB600; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-left: 5px solid #8DB600;
        }
        .stat-card h3 { color: #666; font-size: 14px; }
        .stat-card .number { font-size: 28px; font-weight: bold; color: #8DB600; }
        .form-card, .table-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .form-title { color: #8DB600; margin-bottom: 20px; }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        .btn-submit { background: #8DB600; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #8DB600; color: white; }
        .delete-btn { background: #f44336; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .footer { text-align: center; padding: 20px; color: #666; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><img src="images/Logo.png" alt="Logo"><h1>DAWAMU SCHOOL - Exam Results</h1></div>
        <a href="teacher-dashboard.html" class="back-btn">← Back to Dashboard</a>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><h3>Total Students</h3><div class="number" id="totalStudents">0</div></div>
            <div class="stat-card"><h3>Class Average</h3><div class="number" id="classAvg">0%</div></div>
            <div class="stat-card"><h3>Top Student</h3><div class="number" id="topStudent">-</div></div>
            <div class="stat-card"><h3>Pass Rate</h3><div class="number" id="passRate">0%</div></div>
        </div>
        
        <div class="form-card">
            <h2 class="form-title">📝 Add/Edit Exam Result</h2>
            <div class="form-row">
                <div class="form-group"><label>Student</label><select id="studentName"></select></div>
                <div class="form-group"><label>Subject</label><select id="subject"><option>Mathematics</option><option>Science</option><option>English</option><option>Kiswahili</option><option>History</option></select></div>
                <div class="form-group"><label>Marks (%)</label><input type="number" id="marks" min="0" max="100"></div>
                <div class="form-group"><label>Exam Type</label><select id="examType"><option>Mid-Term</option><option>End-Term</option><option>CAT 1</option><option>CAT 2</option></select></div>
            </div>
            <button class="btn-submit" onclick="addResult()">Add Result</button>
        </div>
        
        <div class="table-card">
            <h2 class="form-title">📋 All Exam Results</h2>
            <div style="overflow-x: auto;">
                <table id="resultsTable">
                    <thead><tr><th>Student</th><th>Subject</th><th>Marks</th><th>Grade</th><th>Exam Type</th><th>Actions</th></tr></thead>
                    <tbody id="resultsList"></tbody>
                </table>
            </div>
        </div>
        <div class="footer"><p>Dawamu School Teacher Portal</p></div>
    </div>
    
    <script>
        let students = JSON.parse(localStorage.getItem('examStudents')) || [
            { id: 1, name: "James Mwangi" }, { id: 2, name: "Brian Otieno" }, 
            { id: 3, name: "Alex Kimani" }, { id: 4, name: "Michael Omondi" }
        ];
        let results = JSON.parse(localStorage.getItem('examResults')) || [
            { student: "James Mwangi", subject: "Mathematics", marks: 85, examType: "Mid-Term" },
            { student: "Brian Otieno", subject: "Science", marks: 78, examType: "Mid-Term" }
        ];
        
        function saveResults() { localStorage.setItem('examResults', JSON.stringify(results)); }
        
        function getGrade(marks) {
            if(marks >= 80) return "A";
            if(marks >= 70) return "B";
            if(marks >= 60) return "C";
            if(marks >= 50) return "D";
            return "E";
        }
        
        function updateStats() {
            const total = results.length;
            const avg = total > 0 ? results.reduce((sum, r) => sum + r.marks, 0) / total : 0;
            document.getElementById('totalStudents').innerText = students.length;
            document.getElementById('classAvg').innerText = Math.round(avg) + '%';
            document.getElementById('passRate').innerText = results.filter(r => r.marks >= 50).length + '%';
        }
        
        function displayResults() {
            const tbody = document.getElementById('resultsList');
            tbody.innerHTML = '';
            results.forEach((r, i) => {
                tbody.innerHTML += `<tr><td>${r.student}</td><td>${r.subject}</td><td>${r.marks}%</td><td style="color:#8DB600; font-weight:bold">${getGrade(r.marks)}</td><td>${r.examType}</td><td><button class="delete-btn" onclick="deleteResult(${i})">Delete</button></td></tr>`;
            });
            updateStats(); saveResults();
        }
        
        function loadStudents() {
            const select = document.getElementById('studentName');
            select.innerHTML = '';
            students.forEach(s => { select.innerHTML += `<option value="${s.name}">${s.name}</option>`; });
        }
        
        function addResult() {
            const student = document.getElementById('studentName').value;
            const subject = document.getElementById('subject').value;
            const marks = parseInt(document.getElementById('marks').value);
            const examType = document.getElementById('examType').value;
            if(student && subject && marks) {
                results.push({ student, subject, marks, examType });
                displayResults();
                document.getElementById('marks').value = '';
                alert('Result added!');
            } else alert('Please fill all fields');
        }
        
        function deleteResult(i) { if(confirm('Delete this result?')) { results.splice(i, 1); displayResults(); } }
        
        loadStudents(); displayResults();
    </script>
</body>
</html>
