<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawamu School - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #F0F5E6; }
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #8DB600;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 50px; }
        .logo h1 { color: #8DB600; }
        .logout-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-left: 5px solid #8DB600;
        }
        .stat-card h3 { color: #666; font-size: 14px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #8DB600; }
        .charts {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .menu-item {
            background: white;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            border-bottom: 3px solid #8DB600;
        }
        .menu-item:hover { transform: translateY(-3px); }
        .menu-item h4 { color: #8DB600; }
        .footer { text-align: center; padding: 20px; color: #666; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="images/Logo.png" alt="Logo">
            <h1>DAWAMU SCHOOL - ADMIN</h1>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card"><h3>Total Students</h3><div class="number">1,250</div></div>
            <div class="stat-card"><h3>Total Staff</h3><div class="number">85</div></div>
            <div class="stat-card"><h3>Today Present</h3><div class="number">1,180</div></div>
            <div class="stat-card"><h3>Subjects</h3><div class="number">8</div></div>
        </div>
        
        <div class="charts">
            <div class="chart-card"><h3>Statistics</h3><canvas id="barChart"></canvas></div>
            <div class="chart-card"><h3>Attendance</h3><canvas id="attChart"></canvas></div>
        </div>
        
        <div class="menu">
            <div class="menu-item" onclick="location.href='manage-subject.html'"><h4>📚 Subjects</h4><p>Manage subjects</p></div>
            <div class="menu-item" onclick="location.href='manage-bill.html'"><h4>💰 Bills</h4><p>Fee management</p></div>
            <div class="menu-item" onclick="location.href='manage-library.html'"><h4>📖 Library</h4><p>Books</p></div>
            <div class="menu-item" onclick="location.href='manage-leaves.html'"><h4>🌿 Leaves</h4><p>Requests</p></div>
        </div>
        
        <div class="footer"><p>Dawamu School Management System</p></div>
    </div>
    
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'], datasets: [{ label: 'Count', data: [850, 920, 1100, 1180], backgroundColor: '#8DB600' }] }
        });
        
        new Chart(document.getElementById('attChart'), {
            type: 'pie',
            data: { labels: ['Present', 'Absent'], datasets: [{ data: [1180, 70], backgroundColor: ['#8DB600', '#f44336'] }] }
        });
        
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';
    </script>
</body>
</html>
