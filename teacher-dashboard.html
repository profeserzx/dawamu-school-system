<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawamu School - Teacher Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #F0F5E6; }
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #8DB600;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 50px; }
        .logo h1 { color: #8DB600; }
        .logout-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-left: 5px solid #8DB600;
        }
        .stat-card h3 { color: #666; font-size: 14px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #8DB600; }
        .charts {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .menu-item {
            background: white;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            border-bottom: 3px solid #8DB600;
        }
        .menu-item:hover { transform: translateY(-3px); }
        .menu-item h4 { color: #8DB600; }
        .footer { text-align: center; padding: 20px; color: #666; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="images/Logo.png" alt="Logo">
            <h1>DAWAMU SCHOOL - TEACHER</h1>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card"><h3>My Students</h3><div class="number">45</div></div>
            <div class="stat-card"><h3>Present Today</h3><div class="number">42</div></div>
            <div class="stat-card"><h3>Avg Grade</h3><div class="number">82%</div></div>
            <div class="stat-card"><h3>Subjects</h3><div class="number">5</div></div>
        </div>
        
        <div class="charts">
            <div class="chart-card"><h3>Performance</h3><canvas id="perfChart"></canvas></div>
            <div class="chart-card"><h3>Attendance</h3><canvas id="attChart"></canvas></div>
        </div>
        
        <div class="menu">
            <div class="menu-item" onclick="location.href='teacher-students.html'"><h4>👨‍🎓 Students</h4><p>View students</p></div>
            <div class="menu-item" onclick="location.href='teacher-exams.html'"><h4>📝 Exams</h4><p>Manage results</p></div>
            <div class="menu-item" onclick="location.href='teacher-attendance.html'"><h4>✅ Attendance</h4><p>Mark attendance</p></div>
        </div>
        
        <div class="footer"><p>Dawamu School Teacher Portal</p></div>
    </div>
    
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        new Chart(document.getElementById('perfChart'), {
            type: 'bar',
            data: { labels: ['Math', 'Science', 'English', 'History'], datasets: [{ label: 'Scores', data: [78, 82, 75, 88], backgroundColor: '#8DB600' }] }
        });
        
        new Chart(document.getElementById('attChart'), {
            type: 'line',
            data: { labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'], datasets: [{ label: 'Attendance %', data: [95, 92, 98, 96], borderColor: '#8DB600' }] }
        });
        
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';
    </script>
</body>
</html>
