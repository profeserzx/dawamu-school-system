<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawamu School - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8DB600 0%, #6B8E00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            padding: 40px;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header img { height: 80px; margin-bottom: 15px; }
        .login-header h1 { color: #8DB600; font-size: 28px; }
        .login-header .tagline { color: #666; font-size: 12px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #8DB600; }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #8DB600;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-btn:hover { background: #6B8E00; }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
        .demo-info {
            margin-top: 20px;
            padding: 15px;
            background: #F0F5E6;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            border-left: 4px solid #8DB600;
        }
        .demo-info strong { color: #8DB600; }
        .back-link { text-align: center; margin-top: 15px; }
        .back-link a { color: #8DB600; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="images/Logo.png" alt="Dawamu School">
            <h1>DAWAMU SCHOOL</h1>
            <p class="tagline" id="portalText">Parent Portal</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
        
        <div class="demo-info" id="demoInfo">
            <strong>Demo Account:</strong><br>
            Email: parent@dawamu.com<br>
            Password: parent123
        </div>
        
        <div class="back-link">
            <a href="index.html">← Back to Main Site</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Get portal from URL
        const urlParams = new URLSearchParams(window.location.search);
        const portal = urlParams.get('portal') || 'parent';
        
        // Set portal-specific text
        const portalTexts = {
            parent: { title: 'Parent Portal', btn: 'Login as Parent', demo: 'Demo Parent Account:', email: 'parent@dawamu.com', pass: 'parent123' },
            admin: { title: 'Admin Portal', btn: 'Login as Admin', demo: 'Demo Admin Account:', email: 'admin@dawamu.com', pass: 'admin123' },
            teacher: { title: 'Teacher Portal', btn: 'Login as Teacher', demo: 'Demo Teacher Account:', email: 'teacher@dawamu.com', pass: 'teacher123' }
        };
        
        const info = portalTexts[portal] || portalTexts.parent;
        
        document.getElementById('portalText').innerText = info.title;
        document.getElementById('loginBtn').innerText = info.btn;
        document.getElementById('demoInfo').innerHTML = `
            <strong>${info.demo}</strong><br>
            Email: ${info.email}<br>
            Password: ${info.pass}
        `;
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            try {
                let endpoint = '';
                let redirectPage = '';
                
                if (portal === 'parent') {
                    endpoint = `${API_URL}/parent-login`;
                    redirectPage = 'parent-dashboard.html';
                } else {
                    endpoint = `${API_URL}/login`;
                    redirectPage = portal === 'admin' ? 'admin-dashboard.html' : 'teacher-dashboard.html';
                }
                
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = redirectPage;
                } else {
                    errorDiv.textContent = data.message || 'Login failed. Please check your credentials.';
                    errorDiv.style.display = 'block';
                }
            } catch(err) {
                errorDiv.textContent = 'Server error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
