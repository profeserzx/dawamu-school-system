<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawamu School - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8DB600 0%, #6B8E00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 500px;
            padding: 50px;
            text-align: center;
        }
        .logo img { height: 100px; margin-bottom: 20px; }
        h1 { color: #8DB600; font-size: 32px; margin-bottom: 5px; }
        .tagline { color: #666; font-size: 14px; margin-bottom: 30px; }
        .portal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .portal-card {
            background: #F0F5E6;
            padding: 25px 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .portal-card:hover {
            transform: translateY(-5px);
            border-color: #8DB600;
            box-shadow: 0 5px 20px rgba(141, 182, 0, 0.2);
        }
        .portal-card .icon { font-size: 40px; display: block; margin-bottom: 10px; }
        .portal-card h3 { color: #333; font-size: 16px; }
        .portal-card p { color: #666; font-size: 12px; margin-top: 5px; }
        .footer { color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="images/Logo.png" alt="Dawamu School">
        </div>
        <h1>DAWAMU SCHOOL</h1>
        <p class="tagline">Transforming Boys Into Leaders</p>
        
        <div class="portal-grid">
            <div class="portal-card" onclick="location.href='parent-login.html'">
                <span class="icon">👨‍👩‍👧</span>
                <h3>Parent Portal</h3>
                <p>Track your child's progress</p>
            </div>
            <div class="portal-card" onclick="location.href='admin-login.html'">
                <span class="icon">👨‍💼</span>
                <h3>Admin Portal</h3>
                <p>Manage school operations</p>
            </div>
            <div class="portal-card" onclick="location.href='teacher-login.html'">
                <span class="icon">👨‍🏫</span>
                <h3>Teacher Portal</h3>
                <p>Manage classes & students</p>
            </div>
        </div>
        
        <div class="footer">© 2026 Dawamu School | All Rights Reserved</div>
    </div>
</body>
</html>
