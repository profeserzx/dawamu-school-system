<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawamu School - Leave Out Sheets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #F0F5E6; }
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #8DB600;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 50px; }
        .logo h1 { color: #8DB600; }
        .back-btn { background: #8DB600; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-left: 5px solid #8DB600;
        }
        .stat-card h3 { color: #666; font-size: 14px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #8DB600; }
        .form-card, .table-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .form-title { color: #8DB600; margin-bottom: 20px; }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        .btn-submit { background: #8DB600; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #8DB600; color: white; }
        .status-approved { color: #4caf50; font-weight: bold; }
        .status-pending { color: #ff9800; font-weight: bold; }
        .status-rejected { color: #f44336; font-weight: bold; }
        .approve-btn, .reject-btn { padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer; margin: 0 3px; }
        .approve-btn { background: #4caf50; color: white; }
        .reject-btn { background: #f44336; color: white; }
        .footer { text-align: center; padding: 20px; color: #666; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><img src="images/Logo.png" alt="Logo"><h1>DAWAMU SCHOOL - Leave Out Sheets</h1></div>
        <a href="admin-dashboard.html" class="back-btn">← Back</a>
    </div>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><h3>Pending</h3><div class="number" id="pendingCount">0</div></div>
            <div class="stat-card"><h3>Approved</h3><div class="number" id="approvedCount">0</div></div>
            <div class="stat-card"><h3>Total Requests</h3><div class="number" id="totalCount">0</div></div>
        </div>
        <div class="form-card">
            <h2 class="form-title">📝 New Leave Out Request</h2>
            <div class="form-row">
                <div class="form-group"><label>Student Name</label><input type="text" id="studentName"></div>
                <div class="form-group"><label>Parent Name</label><input type="text" id="parentName"></div>
                <div class="form-group"><label>Date of Leave</label><input type="date" id="leaveDate"></div>
                <div class="form-group"><label>Return Date</label><input type="date" id="returnDate"></div>
            </div>
            <div class="form-group"><label>Reason for Leave Out</label><textarea id="reason" rows="2" placeholder="Medical appointment, family event, etc..."></textarea></div>
            <div class="form-group"><label>Emergency Contact</label><input type="text" id="emergencyContact" placeholder="Phone number during leave"></div>
            <button class="btn-submit" onclick="addLeaveRequest()">Submit Request</button>
        </div>
        <div class="table-card">
            <h2 class="form-title">📋 All Leave Out Requests</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>Student</th><th>Parent</th><th>Leave Date</th><th>Return Date</th><th>Reason</th><th>Emergency</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="leavesList"></tbody>
                </table>
            </div>
        </div>
        <div class="footer"><p>Dawamu School Management System - Leave Out Sheets (Permission Notes)</p></div>
    </div>
    <script>
        let leaves = JSON.parse(localStorage.getItem('leaveRequests')) || [
            { student: "James Mwangi", parent: "Mary Mwangi", leaveDate: "2026-06-15", returnDate: "2026-06-16", reason: "Medical appointment", emergency: "+254712345678", status: "Pending" },
            { student: "Brian Otieno", parent: "John Otieno", leaveDate: "2026-06-10", returnDate: "2026-06-10", reason: "Family function", emergency: "+254723456789", status: "Approved" }
        ];
        function saveLeaves() { localStorage.setItem('leaveRequests', JSON.stringify(leaves)); }
        function updateStats() {
            const pending = leaves.filter(l => l.status === "Pending").length;
            const approved = leaves.filter(l => l.status === "Approved").length;
            document.getElementById('pendingCount').innerText = pending;
            document.getElementById('approvedCount').innerText = approved;
            document.getElementById('totalCount').innerText = leaves.length;
        }
        function displayLeaves() {
            const tbody = document.getElementById('leavesList');
            tbody.innerHTML = '';
            leaves.forEach((leave, i) => {
                let statusClass = leave.status === 'Approved' ? 'status-approved' : (leave.status === 'Pending' ? 'status-pending' : 'status-rejected');
                tbody.innerHTML += `<tr><td>${leave.student}</td><td>${leave.parent}</td><td>${leave.leaveDate}</td><td>${leave.returnDate}</td><td>${leave.reason}</td><td>${leave.emergency}</td><td class="${statusClass}">${leave.status}</td><td>${leave.status === "Pending" ? `<button class="approve-btn" onclick="approveLeave(${i})">Approve</button><button class="reject-btn" onclick="rejectLeave(${i})">Reject</button>` : leave.status}</td></tr>`;
            });
            updateStats(); saveLeaves();
        }
        function addLeaveRequest() {
            const student = document.getElementById('studentName').value;
            const parent = document.getElementById('parentName').value;
            const leaveDate = document.getElementById('leaveDate').value;
            const returnDate = document.getElementById('returnDate').value;
            const reason = document.getElementById('reason').value;
            const emergency = document.getElementById('emergencyContact').value;
            if(student && parent && reason) {
                leaves.unshift({ student, parent, leaveDate, returnDate, reason, emergency, status: "Pending" });
                displayLeaves();
                document.getElementById('studentName').value = '';
                document.getElementById('parentName').value = '';
                document.getElementById('reason').value = '';
                document.getElementById('emergencyContact').value = '';
                alert('Leave out request submitted!');
            } else alert('Please fill required fields (Student, Parent, Reason)');
        }
        function approveLeave(i) { leaves[i].status = "Approved"; displayLeaves(); alert('Leave out sheet approved'); }
        function rejectLeave(i) { leaves[i].status = "Rejected"; displayLeaves(); alert('Leave out request rejected'); }
        displayLeaves();
    </script>
</body>
</html>
